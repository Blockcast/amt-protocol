# cbindgen configuration for amt-protocol C FFI
# Run: cbindgen --config cbindgen.toml --output include/amt_protocol.h

language = "C"

include_guard = "AMT_PROTOCOL_H"

header = """
/**
 * AMT Protocol Library - C FFI
 *
 * Automatic Multicast Tunneling (RFC 7450) implementation.
 *
 * This header is auto-generated by cbindgen. Do not edit manually.
 *
 * Usage:
 *   1. Create gateway: amt_gateway_new()
 *   2. Protocol operations: start_discovery, handle_advertisement, etc.
 *   3. Free resources: amt_gateway_free(), amt_buffer_free()
 *
 * Memory Management:
 *   - Gateway handles must be freed with amt_gateway_free()
 *   - AmtBuffer data must be freed with amt_buffer_free()
 *   - Strings from amt_driad_build_query must be freed with amt_string_free()
 */
"""

trailer = """
#ifdef __cplusplus
}
#endif
"""

include_version = true

[defines]
"feature = ffi" = "AMT_FFI"

[export]
include = [
    "AmtResult",
    "AmtGatewayState",
    "AmtBuffer",
    "AmtGatewayHandle",
]

[export.rename]
"AmtGatewayHandle" = "amt_gateway_handle_t"

[fn]
rename_args = "SnakeCase"

[enum]
rename_variants = "ScreamingSnakeCase"

[struct]
rename_fields = "SnakeCase"
